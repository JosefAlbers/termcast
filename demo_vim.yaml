    filename: "server.py"
    vim_mode: NORMAL
    start_line: 38
    duration: 0.5
    pause_after: 0.0
    content: *server

  - type: editor
    mode: vim
    filename: "server.py"
    vim_mode: NORMAL
    start_line: 22
    duration: 0.5
    pause_after: 0.0
    content: *server

  - type: editor
    mode: vim
    filename: "server.py"
    vim_mode: NORMAL
    start_line: 1
    duration: 0.8
    pause_after: 0.3
    content: *server

  # ── 6. /search — jump to APIHandler class ────────────────────────────────
  - type: title
    text: "/APIHandler"
    subtitle: "search forward"
    duration: 0.7
    pause_after: 0.0

  - type: editor
    mode: vim
    filename: "server.py"
    vim_mode: NORMAL
    start_line: 44
    highlight_lines: [47]
    duration: 1.8
    pause_after: 0.3
