      use std::collections::HashMap;
      use std::sync::{Arc, Mutex};

      #[derive(Debug, Clone)]
      pub struct User {
          pub id: u64,
          pub name: String,
          pub email: String,
          pub role: Role,
          pub active: bool,
      }

      #[derive(Debug, Clone, PartialEq)]
      pub enum Role {
          Admin,
          Member,
          Guest,
      }

      pub type UserStore = Arc<Mutex<HashMap<u64, User>>>;

      pub fn new_store() -> UserStore {
          Arc::new(Mutex::new(HashMap::new()))
      }

      pub fn insert_user(store: &UserStore, user: User) -> u64 {
          let id = user.id;
          store.lock().unwrap().insert(id, user);
          id
      }

      pub fn get_user(store: &UserStore, id: u64) -> Option<User> {
          store.lock().unwrap().get(&id).cloned()
      }

      pub fn delete_user(store: &UserStore, id: u64) -> bool {
          let mut map = store.lock().unwrap();
          if let Some(u) = map.get_mut(&id) {
              u.active = false;
              true
          } else {
              false
          }
      }

      #[cfg(test)]
      mod tests {
          use super::*;

          fn make_user(id: u64) -> User {
              User {
                  id,
                  name: format!("user_{}", id),
                  email: format!("user_{}@example.com", id),
                  role: Role::Member,
                  active: true,
              }
          }

          #[test]
          fn test_insert_and_get() {
              let store = new_store();
              let u = make_user(1);
              insert_user(&store, u.clone());
              assert_eq!(get_user(&store, 1).unwrap().name, "user_1");
          }

          #[test]
          fn test_soft_delete() {
              let store = new_store();
              insert_user(&store, make_user(2));
              assert!(delete_user(&store, 2));
              assert!(!get_user(&store, 2).unwrap().active);
          }
      }

