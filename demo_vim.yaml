      #!/usr/bin/env python3
      """
      Minimal async HTTP API server.
      Handles /health, /users, and /users/<id> routes.
      Long lines ahead to demonstrate text wrapping in the editor viewport.
      """
      from __future__ import annotations

      import asyncio
      import json
      import logging
      import os
      import time
      from dataclasses import dataclass, field, asdict
      from typing import Any, Optional
      from http.server import BaseHTTPRequestHandler, HTTPServer
      from socketserver import ThreadingMixIn

      logger = logging.getLogger(__name__)
      logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(name)s: %(message)s")

      # ── Data layer ────────────────────────────────────────────────────────────────────────────────────────────
      # In production you'd replace these in-memory stores with a real database connection (Postgres, SQLite, etc.)

      @dataclass
      class User:
          id: int
          name: str
          email: str
          role: str = "member"
          created_at: float = field(default_factory=time.time)
          active: bool = True

          def to_dict(self) -> dict[str, Any]:
              return asdict(self)

      _users: dict[int, User] = {
          1: User(id=1, name="Alice Nakamura",  email="alice@example.com",  role="admin"),
          2: User(id=2, name="Bob Osei-Bonsu",  email="bob@example.com",    role="member"),
          3: User(id=3, name="Carol Reyes",     email="carol@example.com",  role="member"),
          4: User(id=4, name="Dave Petrov",     email="dave@example.com",   role="member"),
      }
      _next_id: int = 5

      # ── Request handler ───────────────────────────────────────────────────────────────────────────────────────

      class APIHandler(BaseHTTPRequestHandler):
          """Handle incoming HTTP requests and route them to the correct method."""

          def log_message(self, fmt: str, *args: Any) -> None:  # silence default httpd logging
              logger.info(fmt % args)

          def send_json(self, status: int, data: Any) -> None:
              body = json.dumps(data, indent=2).encode()
              self.send_response(status)
              self.send_header("Content-Type", "application/json")
              self.send_header("Content-Length", str(len(body)))
              self.end_headers()
              self.wfile.write(body)

          def do_DELETE(self) -> None:
              """Soft-delete a user by setting active=False."""
              if not self.path.startswith("/users/"):
                  self.send_json(404, {"error": "not found"})
                  return
              try:
                  uid = int(self.path.split("/")[-1])
              except ValueError:
                  self.send_json(400, {"error": "invalid user id"})
                  return
              user = _users.get(uid)
              if user and user.active:
                  user.active = False
                  self.send_json(200, {"deleted": uid})
              else:
                  self.send_json(404, {"error": "user not found"})

          def do_GET(self) -> None:
              if self.path == "/health":
                  self.send_json(200, {"status": "ok", "uptime": time.time()})

              elif self.path == "/users":
                  active = [u.to_dict() for u in _users.values() if u.active]
                  self.send_json(200, {"users": active, "count": len(active)})

              elif self.path.startswith("/users/"):
                  try:
                      uid = int(self.path.split("/")[-1])
                  except ValueError:
                      self.send_json(400, {"error": "invalid user id"})
                      return
                  user = _users.get(uid)
                  if user and user.active:
                      self.send_json(200, user.to_dict())
                  else:
                      self.send_json(404, {"error": "user not found"})
              else:
                  self.send_json(404, {"error": "not found"})

          def do_POST(self) -> None:
              global _next_id
              if self.path != "/users":
                  self.send_json(404, {"error": "not found"})
                  return
              length = int(self.headers.get("Content-Length", 0))
              body = json.loads(self.rfile.read(length))
              user = User(id=_next_id, name=body["name"], email=body["email"],
                          role=body.get("role", "member"))
              _users[_next_id] = user
              _next_id += 1
              self.send_json(201, user.to_dict())

      # ── Server bootstrap ──────────────────────────────────────────────────────────────────────────────────────

      class ThreadedHTTPServer(ThreadingMixIn, HTTPServer):
          """Serve each request in a separate thread."""
          daemon_threads = True

      def main() -> None:
          port = int(os.getenv("PORT", 8080))
          server = ThreadedHTTPServer(("0.0.0.0", port), APIHandler)
          logger.info("Listening on port %d", port)
          try:
              server.serve_forever()
          except KeyboardInterrupt:
              logger.info("Shutting down")
              server.shutdown()

      if __name__ == "__main__":
          main()

