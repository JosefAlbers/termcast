    filename: "server.py"
    vim_mode: NORMAL
    start_line: 72
    highlight_lines: [85, 86, 87]
    duration: 1.5
    pause_after: 0.0
    content: *server

  # ── 5. Scrolling up slowly — simulate Ctrl-U (half page up) ─────────────
  - type: title
    text: "Ctrl-U"
    subtitle: "scroll half page up"
    duration: 0.5
    pause_after: 0.0

  - type: editor
    mode: vim
    filename: "server.py"
